<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Input</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="sidebar.css">
</head>

<body>
    <div class="container-div">
        <div class="sidebar">
            <div class="">
                <div class="">
                    
                </div>
                <h3 text-align >YHWH Group</h3>
            </div>

            <div>
                <ul class="menu">
                    <li><a class="anchors" href="dashboard.html" target="_blank">Dashboard</a></li>
                    <li><a href="register.html" target="_blank">Register Supplier</a></li>
                    <li><a href="suppliers.html" target="_blank">Suppliers List</a></li>
                    <li><a href="settings.html" target="_blank">Settings</a></li>
                </ul>
            </div>
        </div>


        <div class="main-content">
            <h1 class="heading1">Supplier Registration Form</h1>
            <div class="input-boxes">
                <div class="label"> <label for="">Business Owner</label></div>

                <div class="names">
                    <div class="owner-names">
                        <input class="input-place" type="text" placeholder="First Name">
                    </div>

                    <div class="owner-names">
                        <input class="input-place" type="text" placeholder="Last names">
                    </div>

                </div>


            </div>





            <div class="second-div">
                <div class="input-boxes">
                    <div class="label-divs">
                        <label for="">Telephone Number</label>
                    </div>
                    
                    <input class="input-place 4n-number" type="text" placeholder="+">
                </div>

                <div class="input-boxes">
                    <div class="label-divs">
                         <label for="">Name of business/Organization</label>
                    </div>
                   
                    <input class="input-place" type="text" placeholder="Business name">
                </div>

                <div class="input-boxes">
                    <div class="label-divs"> <label for=""> Email address</label></div>
                   
                    <input class="input-place" type="text" placeholder="Email">
                </div>

                <div class="input-boxes">
                    <div class="label-divs">
                         <label for="country">Location:</label>
                    </div>
                   
                    <select class="input-place" id="country" name="country">
                        <option value="">--Select a City--</option>
                        <option value="">Kampala</option>
                        <option value="">Masaka</option>
                        <option value="">Entebbe</option>
                        <option value="">Munyonyo</option>
                        <option value="">Mbarara</option>
                    </select>
                </div>






                <div class="input-boxes">
                    <div class="label-divs">
                         <label for="">Describe Specific product that you purpose to sell</label>
                    </div>
                   
                    <input class="input-place" type="text">
                </div>








                <button class="submit">Submit</button>
                <button class="cancel">Cancel</button>



            </div>

        </div>

    </div>


</body>

</html>
